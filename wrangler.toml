name = "clinic-receptionist"
main = "src/index.js"
compatibility_date = "2024-11-01"

# One Worker serves every clinic. Tenant identity is resolved at request time
# from the incoming webhook's phone_number_id — no per-tenant deploys.

kv_namespaces = [
  { binding = "TENANTS", id = "8d4c93e2aa9e4c7fa2da478c3c0eaf6f" },
  { binding = "HISTORY", id = "1e0fec46c15b404fb749f1a2da4c597e" }
]

d1_databases = [
  { binding = "CRM_DB", database_name = "clinic-receptionist-crm", database_id = "b8c18990-1d9a-4a55-bddf-1dd1b06d9d9c" }
]

# Secrets (GROQ_API_KEY, VERIFY_TOKEN) are NOT set here.
# Locally: put them in .dev.vars (see .dev.vars.example).
# In production: `wrangler secret put GROQ_API_KEY` / `wrangler secret put VERIFY_TOKEN`.
